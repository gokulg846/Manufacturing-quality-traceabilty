version: 2

models:
  - name: silver_part_population
    description: "Clean part population from CNC process logs."
    columns:
      - name: part_id
        tests: [not_null, unique]
      - name: production_date
        tests: [not_null]
      - name: batch_id
        tests: [not_null]
      - name: spindle_speed
        tests:
          - measurement_between:
              min_value: 8000
              max_value: 14000
      - name: feed_rate
        tests:
          - measurement_between:
              min_value: 300
              max_value: 1000
      - name: coolant_temp
        tests:
          - measurement_between:
              min_value: 18
              max_value: 45
      - name: cycle_time
        tests:
          - measurement_between:
              min_value: 45
              max_value: 180

  - name: silver_cmm_quality
    description: "Part-level CMM quality outcomes."
    columns:
      - name: part_id
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('silver_part_population')
              field: part_id
      - name: inspected_dimension_count
        tests:
          - measurement_between:
              min_value: 1
              max_value: 20
      - name: failed_dimension_count
        tests:
          - measurement_between:
              min_value: 0
              max_value: 20

  - name: silver_torque_quality
    description: "Part-level torque quality outcomes."
    columns:
      - name: part_id
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('silver_part_population')
              field: part_id
      - name: audited_joint_count
        tests:
          - measurement_between:
              min_value: 1
              max_value: 20
      - name: failed_joint_count
        tests:
          - measurement_between:
              min_value: 0
              max_value: 20

  - name: silver_material_quality
    description: "Part-level material quality outcomes joined through material batch."
    columns:
      - name: part_id
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('silver_part_population')
              field: part_id
      - name: batch_id
        tests: [not_null]
      - name: hardness
        tests:
          - measurement_between:
              min_value: 120
              max_value: 280
      - name: tensile_strength
        tests:
          - measurement_between:
              min_value: 450
              max_value: 900

  - name: silver_part_quality_flags
    description: "Consolidated defect flags and root-cause tags per part."
    columns:
      - name: part_id
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('silver_part_population')
              field: part_id
      - name: defect_flag
        tests: [not_null]
      - name: defect_root_cause
        tests:
          - not_null
          - accepted_values:
              values: ['dimension', 'torque', 'material', 'unknown', 'none']
