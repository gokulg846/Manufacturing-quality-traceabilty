version: 2

models:
  - name: bronze_process_parameters
    description: "Bronze CNC process logs, one row per part."
    columns:
      - name: part_id
        tests: [not_null, unique]
      - name: production_date
        tests: [not_null]
      - name: machine_id
        tests: [not_null]
      - name: batch_id
        tests:
          - not_null
          - relationships:
              to: ref('bronze_supplier_material_certs')
              field: batch_id
      - name: spindle_speed
        tests:
          - not_null
          - measurement_between:
              min_value: 8000
              max_value: 14000
      - name: feed_rate
        tests:
          - not_null
          - measurement_between:
              min_value: 300
              max_value: 1000
      - name: coolant_temp
        tests:
          - not_null
          - measurement_between:
              min_value: 18
              max_value: 45
      - name: cycle_time
        tests:
          - not_null
          - measurement_between:
              min_value: 45
              max_value: 180

  - name: bronze_cmm_inspection
    description: "Bronze CMM measurements at part-dimension grain."
    columns:
      - name: part_id
        tests:
          - not_null
          - relationships:
              to: ref('bronze_process_parameters')
              field: part_id
      - name: dimension_name
        tests: [not_null]
      - name: measured_value
        tests:
          - not_null
          - measurement_between:
              min_value: 0
              max_value: 200
      - name: nominal
        tests:
          - not_null
          - measurement_between:
              min_value: 0
              max_value: 200
      - name: tolerance
        tests:
          - not_null
          - measurement_between:
              min_value: 0.001
              max_value: 1
      - name: pass_fail
        tests:
          - not_null
          - accepted_values:
              values: ['PASS', 'FAIL']

  - name: bronze_torque_audit
    description: "Bronze bolted-joint torque audit logs."
    columns:
      - name: part_id
        tests:
          - not_null
          - relationships:
              to: ref('bronze_process_parameters')
              field: part_id
      - name: joint_id
        tests: [not_null]
      - name: target_torque
        tests:
          - not_null
          - measurement_between:
              min_value: 20
              max_value: 100
      - name: actual_torque
        tests:
          - not_null
          - measurement_between:
              min_value: 20
              max_value: 100
      - name: angle
        tests:
          - not_null
          - measurement_between:
              min_value: 25
              max_value: 95
      - name: pass_fail
        tests:
          - not_null
          - accepted_values:
              values: ['PASS', 'FAIL']

  - name: bronze_supplier_material_certs
    description: "Bronze incoming material certificates at supplier-batch grain."
    columns:
      - name: batch_id
        tests: [not_null, unique]
      - name: supplier_id
        tests: [not_null]
      - name: hardness
        tests:
          - not_null
          - measurement_between:
              min_value: 120
              max_value: 280
      - name: tensile_strength
        tests:
          - not_null
          - measurement_between:
              min_value: 450
              max_value: 900
      - name: cert_date
        tests: [not_null]
